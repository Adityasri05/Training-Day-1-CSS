<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Styling</title>
</head>
<style>
.yuyu-regular {
  font-family: "Yuyu", sans-serif;
  font-weight: 400;
  font-style: normal;
}
.montenegrin-gothic-one-regular {
  font-family: "Montenegrin Gothic One", serif;
  font-weight: 400;
  font-style: normal;
}

.titan-one-regular {
  font-family: "Titan One", sans-serif;
  font-weight: 400;
  font-style: normal;
}

.manrope {
  font-family: "Manrope", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
}

.dancing-script {
  font-family: "Dancing Script", cursive;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
}

</style>
<body>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yuyu&display=swap" rel="stylesheet">
    <h1 class="yuyu-regular">This is a heading with Yuyu font</h1>
    <h1 class="montenegrin-gothic-one-regular">This is a heading with Montenegrin Gothic One font</h1>
    <h1 class="titan-one-regular">This is a heading with Titan One font</h1>
    <h1 class="manrope">This is a heading with Manrope font</h1>
    <h1 class="dancing-script">This is a heading with Dancing Script font</h1>
</body>
</html>
